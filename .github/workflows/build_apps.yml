name: Build Chordia (iOS & Android) v4.0.0-beta2
on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'ビルドタイプを選択してください'
        required: true
        default: 'Release (本番用)'
        type: choice
        options:
          - 'Release (本番用)'
          - 'Debug (開発用 Dev Client)'

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: Prebuild
        run: npx expo prebuild --platform ios

      - name: Build Unsigned IPA with Xcode
        run: |
          PROJECT_NAME=$(ls ios | grep .xcworkspace | sed 's/\.xcworkspace//')
          echo "Found project: $PROJECT_NAME"
          
          if [ "${{ github.event.inputs.build_type }}" == "Release (本番用)" ]; then
            CONFIG="Release"
            OUTPUT_NAME="Chordia-Release.ipa"
          else
            CONFIG="Debug"
            OUTPUT_NAME="Chordia-DevClient.ipa"
          fi

          xcodebuild -workspace "./ios/$PROJECT_NAME.xcworkspace" \
            -scheme "$PROJECT_NAME" \
            -configuration $CONFIG \
            -sdk iphoneos \
            -archivePath "./build/$PROJECT_NAME.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

          mkdir Payload
          cp -r "./build/$PROJECT_NAME.xcarchive/Products/Applications/$PROJECT_NAME.app" ./Payload/
          zip -r $OUTPUT_NAME Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Chordia-iOS-IPA
          path: "*.ipa"

  build_android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: Patch react-native-track-player for Kotlin 2.0
        run: |
          MODULE_FILE="node_modules/react-native-track-player/android/src/main/java/com/doublesymmetry/trackplayer/module/MusicModule.kt"
          if [ -f "$MODULE_FILE" ]; then
            echo "Patching MusicModule.kt..."
            sed -i 's/Arguments.fromBundle(item)/Arguments.fromBundle(item!!)/g' "$MODULE_FILE"
            sed -i 's/Arguments.fromBundle(bundle)/Arguments.fromBundle(bundle!!)/g' "$MODULE_FILE"
          else
            echo "MusicModule.kt not found. Skipping patch."
          fi

      - name: Prebuild
        run: npx expo prebuild --platform android

      - name: Build APK
        run: |
          cd android
          if [ "${{ github.event.inputs.build_type }}" == "Release (本番用)" ]; then
            ./gradlew assembleRelease
          else
            ./gradlew assembleDebug
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Chordia-Android-APK
          path: android/app/build/outputs/apk/**/*.apk